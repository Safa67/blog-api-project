version: '3.8'

services:
  db:
    image: postgres:15
    container_name: blog_postgres
    restart: always
    environment:
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: blog_password
      POSTGRES_DB: blog_db
    ports:
      - "5433:5432"
    volumes:
      - blog_db_data:/var/lib/postgresql/data

volumes:
  blog_db_data: